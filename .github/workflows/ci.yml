name: CI

on:
  push:
    branches: [main, "copilot/**", "spec-*"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/backend/EdgeFront.Builder.Tests/EdgeFront.Builder.Tests.csproj --configuration Release --verbosity normal
        working-directory: ${{ github.workspace }}

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          BACKEND_API_BASE_URL: http://localhost:5000
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret-placeholder
          AZURE_AD_CLIENT_ID: ci-client-id
          AZURE_AD_CLIENT_SECRET: ci-client-secret
          AZURE_AD_TENANT_ID: ci-tenant-id
